apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-service-sa
  namespace: cloudcart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-service-config
  namespace: cloudcart
data:
  PORT: "5003"
  REDIS_HOST: "redis-service.cloudcart.svc.cluster.local"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: cart-service-secret
  namespace: cloudcart
type: Opaque
data:
  # base64 encoded: redis://redis-service:6379
  REDIS_URL: cmVkaXM6Ly9yZWRpcy1zZXJ2aWNlOjYzNzk=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service-deployment
  namespace: cloudcart
  labels:
    app: cart-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      serviceAccountName: cart-service-sa
      containers:
        - name: cart-service
          image: cloudcartai/cart-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: cart-service-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cart-service-secret
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /live
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 5003
            failureThreshold: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service-svc
  namespace: cloudcart
spec:
  type: ClusterIP
  ports:
    - port: 5003
      targetPort: 5003
      protocol: TCP
  selector:
    app: cart-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cart-service-ingress
  namespace: cloudcart
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.cloudcart.ai
      http:
        paths:
          - path: /api/v1/cart
            pathType: Prefix
            backend:
              service:
                name: cart-service-svc
                port:
                  number: 5003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart-service-hpa
  namespace: cloudcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart-service-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cart-service-pdb
  namespace: cloudcart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cart-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart-service-netpol
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      app: cart-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
