apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service-sa
  namespace: cloudcart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: cloudcart
data:
  PORT: "5002"
  MONGO_HOST: "mongodb-service.cloudcart.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "cloudcart"
---
apiVersion: v1
kind: Secret
metadata:
  name: product-service-secret
  namespace: cloudcart
type: Opaque
data:
  # base64 encoded: mongodb://admin:pass@mongodb-service:27017/cloudcart
  MONGO_URI: bW9uZ29kYjovL2FkbWluOnBhc3NAbW9uZ29kYi1zZXJ2aWNlOjI3MDE3L2Nsb3VkY2FydA==
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-deployment
  namespace: cloudcart
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: product-service
    spec:
      serviceAccountName: product-service-sa
      containers:
        - name: product-service
          image: cloudcartai/product-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: product-service-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: MONGO_URI
          livenessProbe:
            httpGet:
              path: /live
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 5002
            failureThreshold: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service-svc
  namespace: cloudcart
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
      protocol: TCP
  selector:
    app: product-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-service-ingress
  namespace: cloudcart
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.cloudcart.ai
      http:
        paths:
          - path: /api/v1/products
            pathType: Prefix
            backend:
              service:
                name: product-service-svc
                port:
                  number: 5002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: cloudcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: product-service-pdb
  namespace: cloudcart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: product-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-netpol
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5002
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
