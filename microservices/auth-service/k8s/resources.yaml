apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: cloudcart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: cloudcart
data:
  PORT: "5001"
  DB_HOST: "postgres-db-service.cloudcart.svc.cluster.local"
  DB_NAME: "cloudcart"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: cloudcart
type: Opaque
data:
  # base64 encoded: securepassword123
  DB_PASSWORD: c2VjdXJlcGFzc3dvcmQxMjM=
  # base64 encoded: cloudcart_auth_secure_jwt_secret_key_v1
  JWT_SECRET: Y2xvdWRjYXJ0X2F1dGhfc2VjdXJlX2p3dF9zZWNyZXRfa2V5X3Yx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: cloudcart
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa
      containers:
        - name: auth-service
          image: cloudcartai/auth-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /live
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 5001
            failureThreshold: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-svc
  namespace: cloudcart
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  selector:
    app: auth-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  namespace: cloudcart
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.cloudcart.ai
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 5001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: cloudcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: cloudcart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from API Gateway (frontend / ingress-nginx)
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5001
  egress:
    # Allow connection to PostgreSQL database in cloudcart namespace
    - to:
        - podSelector:
            matchLabels:
              app: postgres-db
      ports:
        - protocol: TCP
          port: 5432
