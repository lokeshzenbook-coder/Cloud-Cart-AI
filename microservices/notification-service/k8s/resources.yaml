apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
  namespace: cloudcart
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: cloudcart
data:
  PORT: "5005"
  RABBITMQ_HOST: "rabbitmq-service.cloudcart.svc.cluster.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: cloudcart
type: Opaque
data:
  # base64 encoded: amqp://guest:guest@rabbitmq-service:5672
  RABBITMQ_URL: YW1xcDovL2d1ZXN0Omd1ZXN0QHJhYmJpdG1xLXNlcnZpY2U6NTY3Mg==
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  namespace: cloudcart
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service-sa
      containers:
        - name: notification-service
          image: cloudcartai/notification-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: notification-service-config
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: RABBITMQ_URL
          livenessProbe:
            httpGet:
              path: /live
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 5005
            failureThreshold: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-svc
  namespace: cloudcart
spec:
  type: ClusterIP
  ports:
    - port: 5005
      targetPort: 5005
      protocol: TCP
  selector:
    app: notification-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notification-service-ingress
  namespace: cloudcart
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.cloudcart.ai
      http:
        paths:
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service-svc
                port:
                  number: 5005
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: cloudcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: cloudcart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notification-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-netpol
  namespace: cloudcart
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5005
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
