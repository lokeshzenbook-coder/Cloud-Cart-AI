{{- if .Values.authService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: auth-service
spec:
  replicas: {{ .Values.authService.replicas }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: "{{ .Values.authService.image.repository }}:{{ .Values.authService.image.tag }}"
          imagePullPolicy: {{ .Values.authService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.authService.service.port }}
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
          env:
            - name: PORT
              value: "{{ .Values.authService.service.port }}"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
{{- end }}
---
{{- if .Values.productService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-product-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: product-service
spec:
  replicas: {{ .Values.productService.replicas }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: "{{ .Values.productService.image.repository }}:{{ .Values.productService.image.tag }}"
          imagePullPolicy: {{ .Values.productService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.productService.service.port }}
          resources:
            {{- toYaml .Values.productService.resources | nindent 12 }}
          env:
            - name: PORT
              value: "{{ .Values.productService.service.port }}"
            - name: MONGO_URI
              value: "mongodb://{{ .Values.mongodb.host }}:{{ .Values.mongodb.port }}/cloudcart"
{{- end }}
